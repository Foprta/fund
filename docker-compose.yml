services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: luna
      POSTGRES_PASSWORD: luna
      POSTGRES_DB: luna_fund
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luna -d luna_fund"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
