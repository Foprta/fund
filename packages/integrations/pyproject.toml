[project]
name = "integrations"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "certifi>=2024.0",
    "fund-core",
    "httpx>=0.28",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/integrations"]

[tool.uv.sources]
fund-core = { workspace = true }
