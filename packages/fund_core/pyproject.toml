[project]
name = "fund-core"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "psycopg[binary]>=3.2",
    "alembic>=1.14",
    "pgvector>=0.3",
    "pydantic-settings>=2.6",
    "langchain-core>=0.3",
    "langchain-openai>=0.3",
    "langsmith>=0.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fund_core"]
