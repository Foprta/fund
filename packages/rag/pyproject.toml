[project]
name = "rag"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "fund-core",
    "langchain-text-splitters>=0.3",
    "pgvector>=0.3",
    "pyyaml>=6.0",
]

[project.scripts]
ingest-research = "rag.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rag"]

[tool.uv.sources]
fund-core = { workspace = true }
